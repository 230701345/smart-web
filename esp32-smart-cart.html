<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ESP32 Smart Cart</title>
  <style>
    :root {
      --bg: #0f172a;
      --panel: #111827;
      --muted: #94a3b8;
      --text: #e5e7eb;
      --accent: #22d3ee;
      --accent-2: #10b981;
      --danger: #ef4444;
      --card: #0b1220;
      --shadow: 0 6px 24px rgba(0,0,0,.35), 0 2px 8px rgba(0,0,0,.25);
      --radius: 16px;
    }
    html,body { height: 100%; background: radial-gradient(1200px 520px at 10% 0%, #0b1220 0%, #0f172a 35%, #0b1220 100%); }
    body {
      margin: 0;
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial;
      color: var(--text);
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }
    .wrap {
      max-width: 1000px;
      margin: 0 auto;
      padding: 20px;
    }
    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 16px 20px;
      border-radius: var(--radius);
      background: linear-gradient(180deg, #0d1324 0%, #0c1222 100%);
      box-shadow: var(--shadow);
    }
    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      font-weight: 600;
      letter-spacing: .3px;
    }
    .brand .logo {
      width: 36px;
      height: 36px;
      border-radius: 12px;
      background: conic-gradient(from 180deg at 50% 50%, #22d3ee 0deg, #10b981 120deg, #6366f1 240deg, #22d3ee 360deg);
      box-shadow: 0 0 0 2px rgba(255,255,255,.08), inset 0 6px 12px rgba(0,0,0,.25);
    }
    .status {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 12px;
      border-radius: 999px;
      background: rgba(255,255,255,.04);
      border: 1px solid rgba(255,255,255,.06);
    }
    .dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      box-shadow: 0 0 0 4px rgba(255,255,255,.06);
    }
    .dot.online { background: var(--accent-2); }
    .dot.offline { background: var(--danger); }
    .grid {
      display: grid;
      grid-template-columns: 1.2fr 1fr;
      gap: 20px;
      margin-top: 20px;
    }
    .card {
      background: linear-gradient(180deg, #0c1428 0%, #0b1220 100%);
      border: 1px solid rgba(255,255,255,.06);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow: hidden;
    }
    .card h3 {
      margin: 0;
      padding: 16px 20px;
      font-size: 16px;
      font-weight: 600;
      color: var(--muted);
      border-bottom: 1px solid rgba(255,255,255,.06);
      background: rgba(255,255,255,.02);
    }
    .card .body { padding: 16px 20px; }
    .stats {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 14px;
    }
    .stat {
      background: rgba(255,255,255,.04);
      border: 1px solid rgba(255,255,255,.06);
      border-radius: 12px;
      padding: 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .stat .label { color: var(--muted); font-size: 13px; }
    .stat .value { font-size: 20px; font-weight: 700; }
    .actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }
    .field {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .field label { font-size: 12px; color: var(--muted); }
    .input, .number {
      width: 100%;
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,.08);
      background: rgba(255,255,255,.05);
      color: var(--text);
      padding: 12px 14px;
      outline: none;
    }
    .input::placeholder { color: #7a8598; }
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 12px 14px;
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,.08);
      background: linear-gradient(180deg, rgba(34,211,238,.12) 0%, rgba(34,211,238,.08) 100%);
      color: var(--text);
      font-weight: 600;
      cursor: pointer;
      transition: transform .06s ease, filter .2s ease;
      user-select: none;
    }
    .btn:hover { filter: brightness(1.1); }
    .btn:active { transform: translateY(1px); }
    .btn.primary { background: linear-gradient(180deg, rgba(34,211,238,.35) 0%, rgba(34,211,238,.22) 100%); }
    .btn.danger { background: linear-gradient(180deg, rgba(239,68,68,.25) 0%, rgba(239,68,68,.16) 100%); }
    .btn:disabled { opacity: .6; cursor: not-allowed; }
    .list {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .item {
      display: grid;
      grid-template-columns: 1fr auto auto auto 120px;
      gap: 10px;
      align-items: center;
      padding: 12px;
      border-radius: 12px;
      background: rgba(255,255,255,.04);
      border: 1px solid rgba(255,255,255,.06);
    }
    .item .name { font-weight: 600; }
    .item .pill {
      font-size: 12px;
      color: var(--muted);
      padding: 6px 10px;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,.08);
      background: rgba(255,255,255,.05);
    }
    .empty {
      text-align: center;
      color: var(--muted);
      padding: 18px 0;
      border-radius: 12px;
      background: rgba(255,255,255,.03);
      border: 1px dashed rgba(255,255,255,.08);
    }
    .footer {
      margin-top: 20px;
      text-align: center;
      color: var(--muted);
      font-size: 12px;
    }
    @media (max-width: 900px) {
      .grid { grid-template-columns: 1fr; }
      .actions { grid-template-columns: 1fr; }
      .item { grid-template-columns: 1fr auto auto 100px; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="topbar">
      <div class="brand">
        <div class="logo"></div>
        <div>ESP32 Smart Cart</div>
      </div>
      <div class="status">
        <div id="status-dot" class="dot offline"></div>
        <div id="status-text">Offline</div>
      </div>
    </div>

    <div class="grid">
      <div class="card">
        <h3>Cart Overview</h3>
        <div class="body">
          <div class="stats">
            <div class="stat">
              <div class="label">Items</div>
              <div id="stat-items" class="value">0</div>
            </div>
            <div class="stat">
              <div class="label">Total</div>
              <div id="stat-total" class="value">$0.00</div>
            </div>
          </div>
          <div style="height:12px"></div>
          <div class="actions">
            <div class="field">
              <label>Product name</label>
              <input id="input-name" class="input" placeholder="e.g. Apple">
            </div>
            <div class="field">
              <label>Price</label>
              <input id="input-price" class="number" type="number" min="0" step="0.01" placeholder="0.00">
            </div>
            <div class="field">
              <label>Quantity</label>
              <input id="input-qty" class="number" type="number" min="1" step="1" value="1">
            </div>
            <div class="field" style="align-self:end">
              <button id="btn-add" class="btn primary">Add Item</button>
            </div>
            <div class="field" style="grid-column:1 / -1">
              <button id="btn-clear" class="btn danger">Clear Cart</button>
            </div>
          </div>
        </div>
      </div>

      <div class="card">
        <h3>Products</h3>
        <div class="body">
          <div id="list" class="list"></div>
        </div>
      </div>
    </div>

    <div class="footer">ESP32 REST UI • No external libraries</div>
  </div>

  <script>
    (function(){
      const currency = new Intl.NumberFormat('en-US', { style: 'currency', currency: 'USD' });
      const API_BASE = '';
      const ENDPOINTS = {
        status: '/status',
        cart: '/cart',
        add: '/cart/add',
        remove: '/cart/remove',
        clear: '/cart/clear'
      };
      const el = {
        dot: document.getElementById('status-dot'),
        status: document.getElementById('status-text'),
        items: document.getElementById('stat-items'),
        total: document.getElementById('stat-total'),
        list: document.getElementById('list'),
        add: document.getElementById('btn-add'),
        clear: document.getElementById('btn-clear'),
        name: document.getElementById('input-name'),
        price: document.getElementById('input-price'),
        qty: document.getElementById('input-qty')
      };
      let connected = false;
      let cart = { items: [], total_items: 0, total_price: 0 };

      function url(path){ return (API_BASE || window.location.origin) + path; }
      function setStatus(ok){
        connected = !!ok;
        el.dot.classList.toggle('online', ok);
        el.dot.classList.toggle('offline', !ok);
        el.status.textContent = ok ? 'Online' : 'Offline';
        el.add.disabled = !ok;
        el.clear.disabled = !ok || (cart.total_items === 0);
      }
      function renderCart(){
        el.items.textContent = String(cart.total_items || 0);
        el.total.textContent = currency.format(Number(cart.total_price || 0));
        el.clear.disabled = !connected || (cart.total_items === 0);
        if(!cart.items || cart.items.length === 0){
          el.list.innerHTML = '<div class="empty">No products yet</div>';
          return;
        }
        const frag = document.createDocumentFragment();
        cart.items.forEach(it => {
          const row = document.createElement('div');
          row.className = 'item';
          const name = document.createElement('div');
          name.className = 'name';
          name.textContent = it.name || ('#' + (it.id ?? ''));
          const qty = document.createElement('div');
          qty.className = 'pill';
          qty.textContent = 'Qty: ' + (it.qty ?? 1);
          const price = document.createElement('div');
          price.className = 'pill';
          price.textContent = currency.format(Number(it.price || 0));
          const subtotal = document.createElement('div');
          subtotal.className = 'pill';
          const st = Number(it.price || 0) * Number(it.qty || 1);
          subtotal.textContent = currency.format(st);
          const remove = document.createElement('button');
          remove.className = 'btn danger';
          remove.textContent = 'Remove';
          remove.disabled = !connected;
          remove.onclick = function(){ removeItem(it.id); };
          row.appendChild(name);
          row.appendChild(qty);
          row.appendChild(price);
          row.appendChild(subtotal);
          row.appendChild(remove);
          frag.appendChild(row);
        });
        el.list.innerHTML = '';
        el.list.appendChild(frag);
      }
      async function fetchStatus(){
        try{
          const res = await fetch(url(ENDPOINTS.status), { cache: 'no-store' });
          if(!res.ok) throw new Error('status');
          const data = await res.json();
          setStatus(!!(data.connected ?? data.online ?? data.ok ?? true));
        }catch(e){
          setStatus(false);
        }
      }
      async function fetchCart(){
        try{
          const res = await fetch(url(ENDPOINTS.cart), { cache: 'no-store' });
          if(!res.ok) throw new Error('cart');
          const data = await res.json();
          cart.items = data.items || [];
          cart.total_items = data.total_items ?? (Array.isArray(cart.items) ? cart.items.reduce((a,b)=>a + Number(b.qty||1),0) : 0);
          cart.total_price = data.total_price ?? (Array.isArray(cart.items) ? cart.items.reduce((a,b)=>a + (Number(b.price||0) * Number(b.qty||1)),0) : 0);
          renderCart();
        }catch(e){
          renderCart();
        }
      }
      async function addItem(){
        const name = (el.name.value || '').trim();
        const price = Number(el.price.value || 0);
        const qty = Math.max(1, Number(el.qty.value || 1));
        const payload = {
          id: Date.now(),
          name: name || 'Item',
          price: isFinite(price) ? price : 0,
          qty
        };
        try{
          const res = await fetch(url(ENDPOINTS.add), {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
          });
          if(!res.ok) throw new Error('add');
          await fetchCart();
          el.name.value = '';
          el.price.value = '';
          el.qty.value = '1';
        }catch(e){}
      }
      async function removeItem(id){
        try{
          const res = await fetch(url(ENDPOINTS.remove), {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ id })
          });
          if(!res.ok) throw new Error('remove');
          await fetchCart();
        }catch(e){}
      }
      async function clearCart(){
        try{
          const res = await fetch(url(ENDPOINTS.clear), { method: 'POST' });
          if(!res.ok) throw new Error('clear');
          await fetchCart();
        }catch(e){}
      }
      el.add.addEventListener('click', addItem);
      el.clear.addEventListener('click', clearCart);
      fetchStatus().then(fetchCart);
      setInterval(fetchStatus, 4000);
      setInterval(fetchCart, 5000);
    })();
  </script>
</body>
</html>
